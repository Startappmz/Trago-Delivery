<!DOCTYPE html>
<html lang="pt-mz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Cliente - Trago Delivery</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="trago-system.css">
  <link rel="stylesheet" href="customer-restaurant.css">
</head>
<body class="login-body portal-body">
  <div class="background"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card portal-login">
    <div class="login-header">
      <img src="assets/logo.svg" alt="Trago Delivery" class="login-logo">
      <h1 class="login-title">Portal do Cliente</h1>
      <p class="login-subtitle">Crie entregas e peça comida dos restaurantes parceiros.</p>
    </div>

    <form id="client-login-form" class="form-stack">
      <div class="portal-field">
        <label for="client-name">Nome completo</label>
        <input type="text" id="client-name" placeholder="Ex: Edmilson Mula" required>
      </div>
      <div class="portal-field">
        <label for="client-phone">Contacto principal</label>
        <input type="tel" id="client-phone" placeholder="Ex: 84 000 0000" required minlength="9">
      </div>
      <div class="portal-field">
        <label for="client-email">Email <span style="color:#7c8679;font-weight:600">(opcional)</span></label>
        <input type="email" id="client-email" placeholder="cliente@email.com">
      </div>
      <button type="submit" class="btn-login">
        <span>Entrar no Portal</span>
        <i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <div class="divider"><span>Acesso rápido do cliente</span></div>
    <p class="login-footer">Restaurante parceiro? <a href="login-restaurante.html">Entrar no portal do restaurante</a></p>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const existing = localStorage.getItem('tragoClientSession');
      if (existing) {
        try {
          const session = JSON.parse(existing);
          if (session?.name && session?.phone) {
            document.getElementById('client-name').value = session.name || '';
            document.getElementById('client-phone').value = session.phone || '';
            document.getElementById('client-email').value = session.email || '';
          }
        } catch (_) {}
      }
      document.getElementById('client-login-form').addEventListener('submit', (event) => {
        event.preventDefault();
        const name = document.getElementById('client-name').value.trim();
        const phone = document.getElementById('client-phone').value.trim();
        const email = document.getElementById('client-email').value.trim();
        if (!name || phone.replace(/\D/g, '').length < 9) {
          alert('Preencha nome e contacto válido.');
          return;
        }
        localStorage.setItem('tragoClientSession', JSON.stringify({
          id: `client_${phone.replace(/\D/g, '')}_${Date.now()}`,
          name,
          phone,
          email,
          createdAt: new Date().toISOString()
        }));
        window.location.replace('cliente.html');
      });
    });
  </script>
</body>
</html>
