<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Trago Delivery</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="trago-system.css">
</head>
<body class="login-body">
    <!-- Animated Background -->
    <div class="background"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Theme Toggle -->
    <button class="theme-toggle-float" id="theme-toggle" title="Alternar Tema">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/>
            <path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/>
            <path d="M2 12h2"/><path d="M20 12h2"/>
            <path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/logo.svg" alt="Logotipo Trago Delivery" class="login-logo">
                <h1 class="login-title">Bem-vindo ao Trago Delivery</h1>
                <p class="login-subtitle">Painel Administrativo</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Introduza o seu email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input type="password" id="password" class="form-input" placeholder="Introduza a sua senha" required>
                </div>

                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" checked>
                        <span>Manter sessão iniciada</span>
                    </label>
                </div>

                <button type="submit" class="btn-login">
                    <span>Entrar no Sistema</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="divider">
                <span>Acesso restrito a administradores</span>
            </div>

            <p class="login-footer">
                © 2026 Trago Delivery - Sistema de Gestão de Entregas
            </p>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="custom-alert-modal" class="modal-backdrop hidden">
        <div class="modal-content modal-alert">
            <div class="modal-header">
                <h3 id="custom-alert-title"></h3>
                <button class="modal-close-btn" onclick="closeCustomAlert()">×</button>
            </div>
            <div class="modal-body">
                <p id="custom-alert-message"></p>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-primary" onclick="closeCustomAlert()">OK</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/common/supabaseConfig.js"></script>
    <script src="js/common/api.js"></script>
    <script src="js/common/auth.js"></script>
    <script src="js/common/ui.js"></script>
    <script src="templatemo-glass-admin-script.js"></script>
    
    <script>
document.addEventListener('DOMContentLoaded', () => {
    console.log('Login DOM ready');

    const loginForm = document.getElementById('login-form');

    if (!loginForm) {
        console.error('Form login não encontrado');
        return;
    }

    loginForm.addEventListener('submit', function (e) {
        console.log('Submit capturado');
        handleLogin(e, 'admin');
    });
});
</script>
</body>
</html>
